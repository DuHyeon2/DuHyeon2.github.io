<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Noto Sans KR','JetBrains Mono',sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6z" fill="#475569"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6z" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6z" fill="#22c55e"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#0a0f16"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" rx="12" fill="url(#bgGrad)"/>
  <rect width="960" height="520" rx="12" fill="none" stroke="#1e3044" stroke-width="1"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="700" letter-spacing="2">LLM ORCHESTRATION ARCHITECTURE</text>

  <!-- ============ CLIENT ============ -->
  <rect x="30" y="200" width="110" height="100" rx="10" fill="#1a2735" stroke="#475569" stroke-width="1.2"/>
  <text x="85" y="240" text-anchor="middle" fill="#e8edf3" font-size="13" font-weight="700">Client</text>
  <text x="85" y="260" text-anchor="middle" fill="#94a3b8" font-size="10">(Web / App)</text>
  <!-- monitor icon -->
  <rect x="68" y="270" width="34" height="22" rx="3" fill="none" stroke="#94a3b8" stroke-width="1"/>
  <line x1="85" y1="292" x2="85" y2="297" stroke="#94a3b8" stroke-width="1"/>
  <line x1="76" y1="297" x2="94" y2="297" stroke="#94a3b8" stroke-width="1"/>

  <!-- ============ FASTAPI ============ -->
  <rect x="200" y="180" width="130" height="140" rx="10" fill="#1a2735" stroke="#0ea5e9" stroke-width="1.5"/>
  <rect x="200" y="180" width="130" height="32" rx="10" fill="#0ea5e9" fill-opacity="0.15"/>
  <text x="265" y="202" text-anchor="middle" fill="#0ea5e9" font-size="12" font-weight="700">FastAPI</text>
  <text x="265" y="232" text-anchor="middle" fill="#e8edf3" font-size="11">REST API</text>
  <text x="265" y="250" text-anchor="middle" fill="#94a3b8" font-size="10">요청 수신</text>
  <text x="265" y="268" text-anchor="middle" fill="#94a3b8" font-size="10">워크플로우 트리거</text>
  <text x="265" y="286" text-anchor="middle" fill="#94a3b8" font-size="10">SSE 스트리밍</text>
  <text x="265" y="308" text-anchor="middle" fill="#475569" font-size="9">Python 3.11+</text>

  <!-- ============ TEMPORAL ============ -->
  <rect x="390" y="140" width="180" height="220" rx="10" fill="#1a2735" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="390" y="140" width="180" height="32" rx="10" fill="#f59e0b" fill-opacity="0.15"/>
  <text x="480" y="162" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="700">Temporal Workflow</text>

  <!-- Workflow box -->
  <rect x="405" y="185" width="150" height="40" rx="6" fill="#0f1923" stroke="#f59e0b" stroke-width="0.8" stroke-dasharray="4,2"/>
  <text x="480" y="202" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="700">LLM Orchestrator</text>
  <text x="480" y="216" text-anchor="middle" fill="#94a3b8" font-size="9">재시도 · 타임아웃 · 상태 관리</text>

  <!-- Activity boxes -->
  <rect x="405" y="238" width="70" height="48" rx="5" fill="#0f1923" stroke="#475569" stroke-width="0.8"/>
  <text x="440" y="258" text-anchor="middle" fill="#e8edf3" font-size="9" font-weight="700">Activity 1</text>
  <text x="440" y="272" text-anchor="middle" fill="#94a3b8" font-size="8">프롬프트 생성</text>

  <rect x="485" y="238" width="70" height="48" rx="5" fill="#0f1923" stroke="#475569" stroke-width="0.8"/>
  <text x="520" y="258" text-anchor="middle" fill="#e8edf3" font-size="9" font-weight="700">Activity 2</text>
  <text x="520" y="272" text-anchor="middle" fill="#94a3b8" font-size="8">LLM 호출</text>

  <rect x="405" y="296" width="70" height="48" rx="5" fill="#0f1923" stroke="#475569" stroke-width="0.8"/>
  <text x="440" y="316" text-anchor="middle" fill="#e8edf3" font-size="9" font-weight="700">Activity 3</text>
  <text x="440" y="330" text-anchor="middle" fill="#94a3b8" font-size="8">후처리</text>

  <rect x="485" y="296" width="70" height="48" rx="5" fill="#0f1923" stroke="#475569" stroke-width="0.8"/>
  <text x="520" y="316" text-anchor="middle" fill="#e8edf3" font-size="9" font-weight="700">Activity 4</text>
  <text x="520" y="330" text-anchor="middle" fill="#94a3b8" font-size="8">저장</text>

  <!-- small arrows between activities -->
  <path d="M475,262 L485,262" stroke="#475569" stroke-width="0.8" marker-end="url(#arrow)"/>
  <path d="M520,286 L520,296" stroke="#475569" stroke-width="0.8" marker-end="url(#arrow)"/>
  <path d="M485,320 L475,320" stroke="#475569" stroke-width="0.8"/>

  <!-- ============ LANGCHAIN ============ -->
  <rect x="630" y="170" width="130" height="120" rx="10" fill="#1a2735" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="630" y="170" width="130" height="32" rx="10" fill="#a78bfa" fill-opacity="0.15"/>
  <text x="695" y="192" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700">LangChain</text>
  <text x="695" y="222" text-anchor="middle" fill="#e8edf3" font-size="10">Prompt Template</text>
  <text x="695" y="240" text-anchor="middle" fill="#e8edf3" font-size="10">LLM Chain</text>
  <text x="695" y="258" text-anchor="middle" fill="#e8edf3" font-size="10">Output Parser</text>
  <text x="695" y="280" text-anchor="middle" fill="#475569" font-size="9">OpenAI / Claude</text>

  <!-- ============ LLM API ============ -->
  <rect x="820" y="190" width="110" height="80" rx="10" fill="#1a2735" stroke="#00d4aa" stroke-width="1.5"/>
  <rect x="820" y="190" width="110" height="30" rx="10" fill="#00d4aa" fill-opacity="0.15"/>
  <text x="875" y="211" text-anchor="middle" fill="#00d4aa" font-size="12" font-weight="700">LLM API</text>
  <text x="875" y="240" text-anchor="middle" fill="#e8edf3" font-size="10">GPT-4 / Claude</text>
  <text x="875" y="258" text-anchor="middle" fill="#94a3b8" font-size="9">Completion API</text>

  <!-- ============ REDIS ============ -->
  <rect x="390" y="405" width="180" height="80" rx="10" fill="#1a2735" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="390" y="405" width="180" height="30" rx="10" fill="#ef4444" fill-opacity="0.15"/>
  <text x="480" y="425" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="700">Redis Pub/Sub</text>
  <text x="480" y="452" text-anchor="middle" fill="#e8edf3" font-size="10">실시간 상태 스트리밍</text>
  <text x="480" y="470" text-anchor="middle" fill="#94a3b8" font-size="9">처리 중 → 완료 · 에러 알림</text>

  <!-- ============ ARROWS ============ -->
  <!-- Client → FastAPI -->
  <line x1="140" y1="240" x2="198" y2="240" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="170" y="233" text-anchor="middle" fill="#94a3b8" font-size="8">POST</text>

  <!-- FastAPI → Temporal -->
  <line x1="330" y1="250" x2="388" y2="250" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-accent)"/>
  <text x="359" y="243" text-anchor="middle" fill="#f59e0b" font-size="8">trigger</text>

  <!-- Temporal → LangChain -->
  <line x1="570" y1="230" x2="628" y2="230" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="599" y="223" text-anchor="middle" fill="#a78bfa" font-size="8">invoke</text>

  <!-- LangChain → LLM -->
  <line x1="760" y1="230" x2="818" y2="230" stroke="#00d4aa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="789" y="223" text-anchor="middle" fill="#00d4aa" font-size="8">call</text>

  <!-- Temporal → Redis (status publish) -->
  <line x1="480" y1="362" x2="480" y2="403" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="502" y="385" text-anchor="start" fill="#ef4444" font-size="8">publish</text>

  <!-- Redis → FastAPI (subscribe) -->
  <path d="M390,445 L265,445 L265,322" stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)" stroke-dasharray="6,3"/>
  <text x="310" y="438" text-anchor="middle" fill="#22c55e" font-size="8">subscribe</text>

  <!-- FastAPI → Client (SSE stream) -->
  <path d="M200,280 L85,280 L85,302" stroke="#22c55e" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)" stroke-dasharray="6,3"/>
  <text x="142" y="294" text-anchor="middle" fill="#22c55e" font-size="8">SSE stream</text>

  <!-- ============ LEGEND ============ -->
  <rect x="640" y="400" width="290" height="90" rx="8" fill="#0f1923" stroke="#1e3044" stroke-width="1"/>
  <text x="660" y="420" fill="#94a3b8" font-size="9" font-weight="700">LEGEND</text>
  <line x1="660" y1="435" x2="690" y2="435" stroke="#475569" stroke-width="1.5"/>
  <text x="698" y="438" fill="#94a3b8" font-size="9">요청 흐름 (Request)</text>
  <line x1="790" y1="435" x2="820" y2="435" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="828" y="438" fill="#94a3b8" font-size="9">응답 스트림</text>

  <line x1="660" y1="455" x2="690" y2="455" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="698" y="458" fill="#94a3b8" font-size="9">워크플로우 트리거</text>
  <line x1="790" y1="455" x2="820" y2="455" stroke="#ef4444" stroke-width="1.5"/>
  <text x="828" y="458" fill="#94a3b8" font-size="9">상태 발행</text>

  <rect x="660" y="467" width="10" height="10" rx="2" fill="none" stroke="#a78bfa" stroke-width="1"/>
  <text x="698" y="477" fill="#94a3b8" font-size="9">LLM 체인 호출</text>
  <rect x="790" y="467" width="10" height="10" rx="2" fill="none" stroke="#00d4aa" stroke-width="1"/>
  <text x="828" y="477" fill="#94a3b8" font-size="9">외부 API 호출</text>
</svg>